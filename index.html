<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N10-009 Gap Drill — Grid Build Study Lab</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Outfit:wght@300;400;600;700;800&display=swap');

:root {
  --bg: #0a0612;
  --bg2: #110d1e;
  --panel: #15102a;
  --panel2: #1a1335;
  --border: #2a1f4a;
  --border2: #3d2d6b;
  --accent: #e8622a;
  --accent-dim: #7a3218;
  --accent-glow: rgba(232,98,42,0.3);
  --purple: #7c5cbf;
  --purple-dim: #3d2d6b;
  --purple-glow: rgba(124,92,191,0.25);
  --green: #2ecc71;
  --green-dim: rgba(46,204,113,0.15);
  --red: #e74c3c;
  --red-dim: rgba(231,76,60,0.15);
  --yellow: #f39c12;
  --text: #d4cce8;
  --text-dim: #7a6f9a;
  --text-bright: #f0ecf8;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Outfit', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 15% 10%, rgba(124,92,191,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 90%, rgba(232,98,42,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(10,6,18,0.5) 0%, transparent 80%);
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 1.5rem; }

/* ─── LOGIN SCREEN ─── */
.login-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 90vh; gap: 2rem; text-align: center;
}
.login-screen h1 {
  font-family: var(--mono); font-size: 1.6rem; color: var(--accent);
  letter-spacing: 0.15em; text-transform: uppercase;
  text-shadow: 0 0 30px var(--accent-glow);
}
.login-screen .subtitle {
  font-size: 0.85rem; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase;
}
.login-screen .profile-btns { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
.profile-btn {
  background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
  padding: 2rem 3rem; cursor: pointer; transition: all 0.3s;
  display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
}
.profile-btn:hover {
  border-color: var(--accent); background: var(--panel2);
  box-shadow: 0 0 25px var(--accent-glow); transform: translateY(-3px);
}
.profile-btn .name { font-weight: 700; font-size: 1.3rem; color: var(--text-bright); }
.profile-btn .score { font-family: var(--mono); font-size: 0.8rem; color: var(--text-dim); }

/* ─── HEADER ─── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 0; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem;
}
.header-left { display: flex; align-items: center; gap: 1rem; }
.header h2 { font-family: var(--mono); font-size: 1rem; color: var(--accent); letter-spacing: 0.1em; }
.header .user-badge {
  font-size: 0.75rem; color: var(--purple); background: var(--purple-dim);
  padding: 0.25rem 0.75rem; border-radius: 20px; font-weight: 600;
}
.header-btns { display: flex; gap: 0.5rem; }
.btn-sm {
  font-family: var(--mono); font-size: 0.7rem; padding: 0.4rem 0.8rem;
  background: var(--panel); border: 1px solid var(--border); color: var(--text-dim);
  border-radius: 6px; cursor: pointer; transition: all 0.2s;
}
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }

/* ─── DOMAIN DASHBOARD ─── */
.dashboard { margin-bottom: 2rem; }
.dashboard h3 {
  font-family: var(--mono); font-size: 0.75rem; color: var(--text-dim);
  letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 1rem;
}
.domain-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 0.75rem; }
.domain-card {
  background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
  padding: 1rem; cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden;
}
.domain-card:hover { border-color: var(--purple); transform: translateY(-2px); }
.domain-card.active { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
.domain-card .domain-num {
  font-family: var(--mono); font-size: 0.65rem; color: var(--text-dim); margin-bottom: 0.3rem;
}
.domain-card .domain-name { font-weight: 600; font-size: 0.85rem; color: var(--text-bright); margin-bottom: 0.6rem; }
.domain-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 0.3rem; }
.domain-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
.domain-card .domain-stats {
  font-family: var(--mono); font-size: 0.65rem; color: var(--text-dim);
}

/* ─── MODE SELECT ─── */
.mode-bar { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
.mode-btn {
  font-family: var(--mono); font-size: 0.7rem; padding: 0.5rem 1rem;
  background: var(--panel); border: 1px solid var(--border); color: var(--text-dim);
  border-radius: 6px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em;
}
.mode-btn:hover { border-color: var(--purple); color: var(--purple); }
.mode-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

/* ─── QUIZ AREA ─── */
.quiz-area { display: none; }
.quiz-area.visible { display: block; }
.q-counter {
  font-family: var(--mono); font-size: 0.7rem; color: var(--text-dim);
  margin-bottom: 0.75rem; letter-spacing: 0.1em;
}
.q-objective {
  font-family: var(--mono); font-size: 0.65rem; color: var(--purple);
  background: var(--purple-dim); display: inline-block;
  padding: 0.2rem 0.6rem; border-radius: 4px; margin-bottom: 1rem;
}
.q-text {
  font-size: 1.05rem; line-height: 1.6; color: var(--text-bright);
  margin-bottom: 1.5rem; font-weight: 400;
}
.q-choices { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.5rem; }
.choice-btn {
  background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
  padding: 0.85rem 1.1rem; cursor: pointer; transition: all 0.2s;
  font-size: 0.9rem; color: var(--text); text-align: left; font-family: var(--sans);
  display: flex; align-items: center; gap: 0.6rem;
}
.choice-btn .letter {
  font-family: var(--mono); font-weight: 700; font-size: 0.75rem;
  color: var(--text-dim); min-width: 1.5rem;
}
.choice-btn:hover { border-color: var(--purple); background: var(--panel2); }
.choice-btn.selected { border-color: var(--accent); background: rgba(232,98,42,0.1); }
.choice-btn.correct { border-color: var(--green); background: var(--green-dim); }
.choice-btn.incorrect { border-color: var(--red); background: var(--red-dim); }
.choice-btn.show-correct { border-color: var(--green); background: var(--green-dim); }
.choice-btn.disabled { pointer-events: none; }

.feedback-box {
  background: var(--panel2); border: 1px solid var(--border); border-radius: 10px;
  padding: 1.25rem; margin-bottom: 1.5rem; display: none;
}
.feedback-box.visible { display: block; }
.feedback-box .fb-status {
  font-family: var(--mono); font-size: 0.8rem; font-weight: 700;
  margin-bottom: 0.5rem; letter-spacing: 0.05em;
}
.feedback-box .fb-status.correct { color: var(--green); }
.feedback-box .fb-status.incorrect { color: var(--red); }
.feedback-box .fb-explain { font-size: 0.85rem; line-height: 1.6; color: var(--text); }

.next-btn {
  font-family: var(--mono); font-size: 0.8rem; padding: 0.65rem 2rem;
  background: var(--accent); border: none; color: #fff; border-radius: 8px;
  cursor: pointer; font-weight: 600; letter-spacing: 0.05em;
  transition: all 0.2s; display: none;
}
.next-btn.visible { display: inline-block; }
.next-btn:hover { background: #d45520; transform: translateY(-1px); box-shadow: 0 4px 15px var(--accent-glow); }

/* ─── SESSION SUMMARY ─── */
.summary { display: none; }
.summary.visible { display: block; }
.summary h3 { font-family: var(--mono); font-size: 1.1rem; color: var(--accent); margin-bottom: 1rem; }
.summary-stats {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; margin-bottom: 1.5rem;
}
.stat-card {
  background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
  padding: 1rem; text-align: center;
}
.stat-card .stat-val { font-family: var(--mono); font-size: 1.8rem; font-weight: 700; }
.stat-card .stat-label { font-size: 0.7rem; color: var(--text-dim); margin-top: 0.3rem; }
.summary-domains { margin-bottom: 1.5rem; }
.summary-domain-row {
  display: flex; align-items: center; gap: 1rem; padding: 0.5rem 0;
  border-bottom: 1px solid var(--border);
}
.summary-domain-row .sd-name { flex: 1; font-size: 0.85rem; }
.summary-domain-row .sd-score { font-family: var(--mono); font-size: 0.85rem; font-weight: 600; }

.restart-btn {
  font-family: var(--mono); font-size: 0.8rem; padding: 0.65rem 2rem;
  background: var(--purple); border: none; color: #fff; border-radius: 8px;
  cursor: pointer; font-weight: 600; transition: all 0.2s;
}
.restart-btn:hover { background: #6b4eaa; }

@media (max-width: 600px) {
  .domain-grid { grid-template-columns: 1fr 1fr; }
  .summary-stats { grid-template-columns: 1fr; }
  .profile-btn { padding: 1.5rem 2rem; }
}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ══════════════════════════════════════════════════════════════
// N10-009 GAP DRILL — QUESTION DATABASE
// Tailored from Michael & Gabe's Canvas quiz misses
// ══════════════════════════════════════════════════════════════

const DOMAINS = {
  "1.0": { name: "Networking Concepts", weight: 23 },
  "2.0": { name: "Network Implementation", weight: 20 },
  "3.0": { name: "Network Operations", weight: 19 },
  "4.0": { name: "Network Security", weight: 19 },
  "5.0": { name: "Network Troubleshooting", weight: 19 }
};

// weakFor: 'M' = Michael, 'G' = Gabe, 'B' = both
const QUESTIONS = [
  // ── DOMAIN 1.0: NETWORKING CONCEPTS ──
  {id:1, domain:"1.0", obj:"1.8", weakFor:"B",
   q:"A server needs a consistent IP from DHCP without using a static assignment. What should the admin configure?",
   choices:["A DHCP reservation based on the server's MAC address","A separate /32 scope for the server","A static IP within the DHCP range","SLAAC for the server"],
   answer:0,
   explain:"A DHCP reservation ties a specific IP to a MAC address, so the server always gets the same IP dynamically. This avoids conflicts that can happen with manual static IPs inside a DHCP range."},
  {id:2, domain:"1.0", obj:"1.8", weakFor:"B",
   q:"A single user cannot reach a website by URL, but other users can access it fine. What is the most likely local cause?",
   choices:["The hosts file on that user's machine","A bad nameserver record","A self-signed certificate","An IP helper misconfiguration"],
   answer:0,
   explain:"The local hosts file can override DNS resolution for a specific machine. If it has a stale or wrong entry for that domain, only that user is affected. Other DNS-level issues would affect all users."},
  {id:3, domain:"1.0", obj:"1.8", weakFor:"B",
   q:"A company wants newapp.example.com to always resolve to the same address as www.example.com. Which DNS record type should they create?",
   choices:["CNAME","NS","MX","SOA"],
   answer:0,
   explain:"CNAME (Canonical Name) creates an alias that points one hostname to another. It ensures newapp.example.com always resolves to whatever IP www.example.com points to, staying in sync automatically."},
  {id:4, domain:"1.0", obj:"1.8", weakFor:"B",
   q:"After migrating to a new mail server and updating the MX record, users still can't receive email. The A record is correct. What should the engineer have done beforehand?",
   choices:["Reduced the TTL before the MX record change","Changed the email client configuration","Performed a DNS zone transfer","Updated the NS record"],
   answer:0,
   explain:"High TTL values mean DNS resolvers worldwide cache the old record for a long time. Lowering the TTL well before the change ensures the new record propagates quickly when you make the switch."},
  {id:5, domain:"1.0", obj:"1.8", weakFor:"B",
   q:"An organization moved its DNS servers to new IPs. Customers can no longer reach the website. Which DNS records need updating at the registrar?",
   choices:["NS records","A records","CNAME records","MX records"],
   answer:0,
   explain:"NS (Name Server) records at the registrar tell the internet which DNS servers are authoritative for your domain. When you move DNS servers, you must update these NS records so queries go to the right place."},
  {id:6, domain:"1.0", obj:"1.8", weakFor:"B",
   q:"An admin needs to change where outside DNS records are hosted. Which record should be changed at the registrar?",
   choices:["NS","SOA","PTR","CNAME"],
   answer:0,
   explain:"NS records at the registrar delegate DNS authority. Changing where DNS is hosted means pointing NS records to the new DNS provider's nameservers."},
  {id:7, domain:"1.0", obj:"1.6", weakFor:"B",
   q:"Which internal routing protocol is best characterized as having fast convergence and being loop-free?",
   choices:["OSPF","STP","BGP","RIP"],
   answer:0,
   explain:"OSPF uses Dijkstra's SPF algorithm which inherently prevents loops and converges quickly when topology changes. STP prevents Layer 2 loops but isn't a routing protocol. BGP is an exterior gateway protocol, not internal."},
  {id:8, domain:"1.0", obj:"1.6", weakFor:"B",
   q:"Which routing protocol uses the concepts of a successor and a feasible successor?",
   choices:["EIGRP","OSPF","BGP","RIP"],
   answer:0,
   explain:"EIGRP maintains a topology table with successor (best path) and feasible successor (backup path that's loop-free). This allows near-instant failover without full recalculation. No other protocol uses this terminology."},
  {id:9, domain:"1.0", obj:"1.6", weakFor:"G",
   q:"Which of the following does OSPF use to communicate routing updates?",
   choices:["Multicast","Broadcast","Unicast","Anycast"],
   answer:0,
   explain:"OSPF uses multicast addresses 224.0.0.5 (all OSPF routers) and 224.0.0.6 (DR/BDR) to send LSAs. This is more efficient than broadcast because only OSPF routers process the packets."},
  {id:10, domain:"1.0", obj:"1.6", weakFor:"G",
   q:"Which routing technology uses unequal-cost load balancing and port 88?",
   choices:["EIGRP","OSPF","BGP","RIP"],
   answer:0,
   explain:"EIGRP is the only common routing protocol that supports unequal-cost load balancing through its variance command. It uses IP protocol 88 (not a TCP/UDP port — it runs directly over IP)."},
  {id:11, domain:"1.0", obj:"1.3", weakFor:"B",
   q:"Which cloud deployment model is most commonly associated with multitenancy and is generally offered by a service provider?",
   choices:["Public","Private","Community","Hybrid"],
   answer:0,
   explain:"Public cloud is inherently multitenant — the provider shares infrastructure across many customers. Private cloud is single-tenant. Hybrid combines both but isn't defined by multitenancy."},
  {id:12, domain:"1.0", obj:"1.3", weakFor:"M",
   q:"Which technology is used to stage copies of a website closer to geographically dispersed users?",
   choices:["CDN","SDN","VPN","SAN"],
   answer:0,
   explain:"A Content Delivery Network caches copies of web content at edge servers around the world, reducing latency for users by serving content from a nearby location."},
  {id:13, domain:"1.0", obj:"1.3", weakFor:"G",
   q:"Which is most closely associated with a dedicated link to a cloud environment that may not include encryption?",
   choices:["Direct Connect","Captive portal","Internet gateway","VPN"],
   answer:0,
   explain:"Direct Connect (AWS) or ExpressRoute (Azure) provides a dedicated private link to the cloud, bypassing the public internet. It doesn't inherently include encryption — that's a separate layer. VPNs provide encryption but use the public internet."},
  {id:14, domain:"1.0", obj:"1.7", weakFor:"B",
   q:"In a high-density wireless environment with device saturation concerns, which 802.11 standard is best suited?",
   choices:["802.11ax (Wi-Fi 6)","802.11ac","802.11n","802.11g"],
   answer:0,
   explain:"802.11ax (Wi-Fi 6) introduced OFDMA and BSS Coloring specifically to handle high-density environments with many devices. OFDMA allows simultaneous transmission to multiple clients, reducing congestion."},
  {id:15, domain:"1.0", obj:"1.7", weakFor:"G",
   q:"A consultant is deploying many WAPs and wants centralized control from one wireless LAN controller. Which network type should they use?",
   choices:["Infrastructure","Mesh","Ad Hoc","Point-to-point"],
   answer:0,
   explain:"Infrastructure mode uses a centralized controller to manage all access points. Mesh is for distributed self-healing networks. Ad hoc is peer-to-peer without infrastructure."},
  {id:16, domain:"1.0", obj:"1.4", weakFor:"B",
   q:"A router interface is 10.0.0.95/28. Which of the following is true about this interface?",
   choices:["10.0.0.95 is the broadcast address for its subnet","The router can reach 10.0.0.81","The subnet starts at 10.0.0.64","Both B and C"],
   answer:0,
   explain:"/28 = 16 IPs per subnet. 10.0.0.80-95 is a subnet, with .80 as network and .95 as broadcast. The router interface IS the broadcast address, which means it can't route properly — it's misconfigured."},
  {id:17, domain:"1.0", obj:"1.4", weakFor:"B",
   q:"An admin needs to connect two routers in a point-to-point link and conserve IP space. Which subnet should they use?",
   choices:["/30","/24","/26","/28"],
   answer:0,
   explain:"/30 gives exactly 4 IPs: network, two usable hosts (one per router), and broadcast. It's the most efficient choice for a point-to-point link. /31 is also valid per RFC 3021 but isn't always an answer choice."},
  {id:18, domain:"1.0", obj:"1.4", weakFor:"B",
   q:"A router has 10.61.52.34 with mask 255.255.255.252. What best describes this interface?",
   choices:["A point-to-point connection","A connection to the internet","A virtual address for redundancy","Out-of-band management"],
   answer:0,
   explain:"255.255.255.252 = /30, which provides only 2 usable IPs. This is the standard subnet size for a point-to-point link between two routers."},
  {id:19, domain:"1.0", obj:"1.4", weakFor:"G",
   q:"Which best describes what an organization would use port address translation for?",
   choices:["Non-routable addresses on the perimeter router","VLANs on the perimeter","A public address on the perimeter router","Servers on the perimeter"],
   answer:0,
   explain:"PAT (a form of NAT) translates many private/non-routable internal addresses to a single public IP, differentiating sessions by port numbers. This is how most organizations share one public IP among many internal devices."},
  {id:20, domain:"1.0", obj:"1.5", weakFor:"G",
   q:"Which network topology contains a direct connection between every node?",
   choices:["Full mesh","Hub-and-spoke","Star","Point-to-point"],
   answer:0,
   explain:"In a full mesh topology, every node is directly connected to every other node. This provides maximum redundancy but is expensive and complex to scale (n*(n-1)/2 links)."},
  {id:21, domain:"1.0", obj:"1.5", weakFor:"G",
   q:"Which topology involves sending all traffic through a single central point?",
   choices:["Hub-and-spoke","Mesh","Hybrid","Point-to-point"],
   answer:0,
   explain:"Hub-and-spoke (also called star) routes all traffic through a central hub. If the hub fails, all spokes lose connectivity. This is common in WAN designs with a central office."},
  {id:22, domain:"1.0", obj:"1.1", weakFor:"B",
   q:"Which OSI layer is responsible for end-to-end encryption and data format translation (like JPEG, ASCII, TLS)?",
   choices:["Presentation (Layer 6)","Session (Layer 5)","Application (Layer 7)","Transport (Layer 4)"],
   answer:0,
   explain:"The Presentation layer handles data format translation, encryption/decryption, and compression. TLS encryption and format conversions (JPEG, ASCII, EBCDIC) happen here."},

  // ── DOMAIN 2.0: NETWORK IMPLEMENTATION ──
  {id:23, domain:"2.0", obj:"2.1", weakFor:"B",
   q:"Which device is specifically designed to distribute incoming traffic across multiple web servers based on load?",
   choices:["Load balancer","Router","Firewall","Switch"],
   answer:0,
   explain:"A load balancer distributes client requests across multiple servers to prevent any single server from being overwhelmed. Routers make forwarding decisions based on IP, not server load."},
  {id:24, domain:"2.0", obj:"2.1", weakFor:"M",
   q:"Which appliance extends a WLAN's footprint for multiple device connections within a designated area?",
   choices:["Access point","Router","Switch","Firewall"],
   answer:0,
   explain:"An access point (AP) provides wireless connectivity within a coverage area. Routers route between networks. A wireless AP specifically extends WLAN reach for multiple simultaneous clients."},
  {id:25, domain:"2.0", obj:"2.3", weakFor:"B",
   q:"An IT manager needs to connect 10 sites in a mesh with security and fast provisioning. Which technology fits best?",
   choices:["SD-WAN","NFV","VPN","VXLAN"],
   answer:0,
   explain:"SD-WAN provides centralized control, automatic encrypted tunnels between sites, fast provisioning of new locations, and intelligent traffic routing. NFV virtualizes network functions but doesn't solve multi-site connectivity."},
  {id:26, domain:"2.0", obj:"2.4", weakFor:"B",
   q:"Which IPsec component encrypts the entire data payload including the original IP header in tunnel mode?",
   choices:["ESP","AH","GRE","IKE"],
   answer:0,
   explain:"ESP (Encapsulating Security Payload) provides encryption and optional authentication. In tunnel mode, it encrypts the entire original packet. AH only authenticates, it doesn't encrypt. IKE negotiates the security association."},
  {id:27, domain:"2.0", obj:"2.4", weakFor:"B",
   q:"Which is the most secure way to provide site-to-site connectivity?",
   choices:["IPSec","IKE","GRE","VXLAN"],
   answer:0,
   explain:"IPSec provides both encryption and authentication for site-to-site links. IKE is part of IPSec (key exchange), not a standalone connectivity solution. GRE provides tunneling but no encryption by itself."},
  {id:28, domain:"2.0", obj:"2.4", weakFor:"G",
   q:"What does a full-tunnel VPN provide that a split-tunnel does not?",
   choices:["Corporate inspection of all network traffic","Lower bandwidth requirements","Access to blocked sites","The ability to reset passwords"],
   answer:0,
   explain:"Full-tunnel routes ALL traffic (including internet) through the corporate VPN gateway, allowing the company to inspect and filter everything. Split-tunnel only routes corporate-bound traffic through the VPN."},
  {id:29, domain:"2.0", obj:"2.2", weakFor:"G",
   q:"A fiber patch panel uses which connector type in the MDF?",
   choices:["SC","F-type","RJ11","BNC"],
   answer:0,
   explain:"SC (Subscriber Connector) is the standard fiber connector for patch panels in distribution frames. F-type is coaxial, RJ11 is telephone, BNC is older coax/test equipment."},
  {id:30, domain:"2.0", obj:"2.2", weakFor:"G",
   q:"Which fiber connector type is most commonly used on a NIC (network interface card)?",
   choices:["LC","SC","ST","MPO"],
   answer:0,
   explain:"LC (Lucent Connector) is the standard small form-factor connector used on SFP/SFP+ modules that plug into NICs and switches. SC is larger and used more on patch panels."},
  {id:31, domain:"2.0", obj:"2.2", weakFor:"G",
   q:"Which connector provides console access to a switch?",
   choices:["RJ45","ST","BNC","SFP"],
   answer:0,
   explain:"Console access to a switch uses an RJ45 port (often labeled 'Console') with a rollover cable. Some newer switches use USB Type-B or USB-C instead."},
  {id:32, domain:"2.0", obj:"2.2", weakFor:"G",

// APP STATE

let state = {
  screen: 'login',
  user: null,
  mode: 'weak', // 'weak', 'all', domain-specific
  domainFilter: null,
  currentQ: 0,
  queue: [],
  answered: false,
  sessionCorrect: 0,
  sessionTotal: 0,
  sessionDomainHits: {},
  sessionDomainTotal: {},
  // persistent per-student scores (in-memory)
  scores: {
    michael: {"1.0":{c:0,t:0},"2.0":{c:0,t:0},"3.0":{c:0,t:0},"4.0":{c:0,t:0},"5.0":{c:0,t:0}},
    gabe:    {"1.0":{c:0,t:0},"2.0":{c:0,t:0},"3.0":{c:0,t:0},"4.0":{c:0,t:0},"5.0":{c:0,t:0}}
  }
};

// ── Helpers ──
function shuffle(arr) { for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }

function getQuestionsForUser(userId) {
  const tag = userId === 'michael' ? 'M' : 'G';
  return QUESTIONS.filter(q => q.weakFor === 'B' || q.weakFor === tag);
}

function buildQueue() {
  let pool = getQuestionsForUser(state.user);
  if (state.mode === 'weak') {
    const gaps = GAPS[state.user].weakDomains;
    const sorted = Object.entries(gaps).sort((a,b) => b[1]-a[1]);
    const topDomains = sorted.slice(0,3).map(d => d[0]);
    pool = pool.filter(q => topDomains.includes(q.domain));
  } else if (state.mode !== 'all' && state.mode.match(/^\d/)) {
    pool = pool.filter(q => q.domain === state.mode);
  }
  return shuffle([...pool]).slice(0, 15);
}

function pct(c,t) { return t === 0 ? 0 : Math.round((c/t)*100); }
function barColor(p) { return p >= 80 ? 'var(--green)' : p >= 50 ? 'var(--yellow)' : 'var(--red)'; }

// ══════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  if (state.screen === 'login') return renderLogin(app);
  if (state.screen === 'dash') return renderDash(app);
  if (state.screen === 'quiz') return renderQuiz(app);
  if (state.screen === 'summary') return renderSummary(app);
}

function renderLogin(app) {
  app.innerHTML = `
    <div class="login-screen">
      <h1>GRID BUILD STUDY LAB</h1>
      <div class="subtitle">CompTIA Network+ N10-009 — Gap Drill</div>

          <div class="score">${GAPS.gabe.totalMisses} gaps mapped</div>
        </div>
      </div>

}

function renderDash(app) {
  const u = state.user;
  const gaps = GAPS[u].weakDomains;
  const sc = state.scores[u];

  let domainCards = '';
  for (const [d, info] of Object.entries(DOMAINS)) {
    const s = sc[d];
    const p = pct(s.c, s.t);
    const misses = gaps[d] || 0;
    const isActive = state.domainFilter === d;
    domainCards += `
      <div class="domain-card ${isActive?'active':''}" onclick="toggleDomain('${d}')">
        <div class="domain-num">${d}</div>
        <div class="domain-name">${info.name}</div>
        <div class="domain-bar"><div class="domain-bar-fill" style="width:${p}%;background:${barColor(p)}"></div></div>
        <div class="domain-stats">${s.c}/${s.t} drilled · ${misses} gaps from quizzes</div>
      </div>`;
  }

  app.innerHTML = `
    <div class="header">
      <div class="header-left">
        <h2>N10-009 GAP DRILL</h2>
        <span class="user-badge">${GAPS[u].name}</span>
      </div>
      <div class="header-btns">
        <button class="btn-sm" onclick="switchUser()">Switch User</button>
      </div>
    </div>
    <div class="dashboard">
      <h3>Domain Performance</h3>
      <div class="domain-grid">${domainCards}</div>
    </div>
    <div class="mode-bar">
      <button class="mode-btn ${state.mode==='weak'?'active':''}" onclick="setMode('weak')">DRILL WEAK AREAS</button>
      <button class="mode-btn ${state.mode==='all'?'active':''}" onclick="setMode('all')">ALL DOMAINS</button>
      ${Object.entries(DOMAINS).map(([d,info]) =>
        `<button class="mode-btn ${state.mode===d?'active':''}" onclick="setMode('${d}')">${d.replace('.0','')}: ${info.name.split(' ')[0]}</button>`
      ).join('')}
    </div>
    <div style="text-align:center;margin-top:1rem;">
      <button class="next-btn visible" onclick="startQuiz()" style="display:inline-block;">START DRILL (15 QUESTIONS)</button>
    </div>`;
}

function renderQuiz(app) {
  const q = state.queue[state.currentQ];
  if (!q) return;
  const letters = ['A','B','C','D','E'];

  let choicesHtml = q.choices.map((c,i) => {
    let cls = 'choice-btn';
    if (state.answered) {
      cls += ' disabled';
      if (i === q.answer) cls += ' correct show-correct';
      else if (i === state.selectedChoice && i !== q.answer) cls += ' incorrect';
    } else if (i === state.selectedChoice) {
      cls += ' selected';
    }
    return `<div class="${cls}" onclick="selectChoice(${i})"><span class="letter">${letters[i]}</span>${c}</div>`;
  }).join('');

  let feedbackHtml = '';
  if (state.answered) {
    const isCorrect = state.selectedChoice === q.answer;
    feedbackHtml = `
      <div class="feedback-box visible">
        <div class="fb-status ${isCorrect?'correct':'incorrect'}">${isCorrect?'CORRECT':'INCORRECT'}</div>
        <div class="fb-explain">${q.explain}</div>
        <div style="margin-top:0.5rem;font-family:var(--mono);font-size:0.65rem;color:var(--text-dim);">
          Objective: ${q.obj} · Domain: ${q.domain} ${DOMAINS[q.domain].name}
        </div>
      </div>`;
  }

  app.innerHTML = `
    <div class="header">
      <div class="header-left">
        <h2>N10-009 GAP DRILL</h2>
        <span class="user-badge">${GAPS[state.user].name}</span>
      </div>
      <div class="header-btns">
        <button class="btn-sm" onclick="endSession()">End Session</button>
      </div>
    </div>
    <div class="quiz-area visible">
      <div class="q-counter">QUESTION ${state.currentQ+1} / ${state.queue.length} · Session: ${state.sessionCorrect}/${state.sessionTotal}</div>
      <div class="q-objective">Obj ${q.obj} — ${DOMAINS[q.domain].name} (${DOMAINS[q.domain].weight}%)</div>
      <div class="q-text">${q.q}</div>
      <div class="q-choices">${choicesHtml}</div>
      ${feedbackHtml}
      ${state.answered ? `<button class="next-btn visible" onclick="nextQuestion()">
        ${state.currentQ < state.queue.length - 1 ? 'NEXT QUESTION →' : 'VIEW RESULTS'}
      </button>` : ''}
      ${!state.answered && state.selectedChoice !== undefined ? `<button class="next-btn visible" onclick="submitAnswer()">SUBMIT</button>` : ''}
    </div>`;
}

function renderSummary(app) {
  const p = pct(state.sessionCorrect, state.sessionTotal);

  let domainRows = '';
  for (const [d, info] of Object.entries(DOMAINS)) {
    const c = state.sessionDomainHits[d] || 0;
    const t = state.sessionDomainTotal[d] || 0;
    if (t === 0) continue;
    const dp = pct(c,t);
    domainRows += `
      <div class="summary-domain-row">
        <div class="sd-name">${d} ${info.name}</div>
        <div class="sd-score" style="color:${barColor(dp)}">${c}/${t} (${dp}%)</div>
      </div>`;
  }

  app.innerHTML = `
    <div class="header">
      <div class="header-left">
        <h2>SESSION COMPLETE</h2>
        <span class="user-badge">${GAPS[state.user].name}</span>
      </div>
    </div>
    <div class="summary visible">
      <h3>Results</h3>
      <div class="summary-stats">
        <div class="stat-card">
          <div class="stat-val" style="color:${barColor(p)}">${p}%</div>
          <div class="stat-label">Score</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" style="color:var(--green)">${state.sessionCorrect}</div>
          <div class="stat-label">Correct</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" style="color:var(--red)">${state.sessionTotal - state.sessionCorrect}</div>
          <div class="stat-label">Missed</div>
        </div>
      </div>
      <h3 style="font-family:var(--mono);font-size:0.8rem;color:var(--text-dim);margin-bottom:0.75rem;">BY DOMAIN</h3>
      <div class="summary-domains">${domainRows}</div>
      <div style="display:flex;gap:1rem;flex-wrap:wrap;">
        <button class="restart-btn" onclick="goToDash()">BACK TO DASHBOARD</button>
        <button class="next-btn visible" onclick="startQuiz()" style="display:inline-block;">DRILL AGAIN</button>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════════════════════
function selectUser(id) {
  state.user = id;
  state.screen = 'dash';
  state.mode = 'weak';
  state.domainFilter = null;
  render();
}

function switchUser() {
  state.screen = 'login';
  state.user = null;
  render();
}

function toggleDomain(d) {
  if (state.domainFilter === d) {
    state.domainFilter = null;
    state.mode = 'weak';
  } else {
    state.domainFilter = d;
    state.mode = d;
  }
  render();
}

function setMode(m) {
  state.mode = m;
  state.domainFilter = m.match(/^\d/) ? m : null;
  render();
}

function startQuiz() {
  state.queue = buildQueue();
  state.currentQ = 0;
  state.answered = false;
  state.selectedChoice = undefined;
  state.sessionCorrect = 0;
  state.sessionTotal = 0;
  state.sessionDomainHits = {};
  state.sessionDomainTotal = {};
  state.screen = 'quiz';
  render();
}

function selectChoice(i) {
  if (state.answered) return;
  state.selectedChoice = i;
  render();
}

function submitAnswer() {
  if (state.selectedChoice === undefined || state.answered) return;
  state.answered = true;
  const q = state.queue[state.currentQ];
  const correct = state.selectedChoice === q.answer;
  state.sessionTotal++;
  if (correct) state.sessionCorrect++;

  // track per-domain
  state.sessionDomainTotal[q.domain] = (state.sessionDomainTotal[q.domain]||0) + 1;
  if (correct) state.sessionDomainHits[q.domain] = (state.sessionDomainHits[q.domain]||0) + 1;

  // update persistent scores
  const sc = state.scores[state.user][q.domain];
  sc.t++;
  if (correct) sc.c++;

  render();
}

function nextQuestion() {
  if (state.currentQ >= state.queue.length - 1) {
    state.screen = 'summary';
    render();
    return;
  }
  state.currentQ++;
  state.answered = false;
  state.selectedChoice = undefined;
  render();
}

function endSession() {
  if (state.sessionTotal > 0) {
    state.screen = 'summary';
  } else {
    state.screen = 'dash';
  }
  render();
}

function goToDash() {
  state.screen = 'dash';
  render();
}

// Init
render();
</script>
</body>
</html>
